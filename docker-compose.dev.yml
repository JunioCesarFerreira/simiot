services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: simiot-mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./containers/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    networks:
      - simiot
    restart: unless-stopped

  nodered:
    image: nodered/node-red:latest
    container_name: simiot-nodered
    ports:
      - "1880:1880"
    volumes:
      - nodered_data:/data
    networks:
      - simiot
    depends_on:
      - mosquitto
    restart: unless-stopped

volumes:
  nodered_data:

networks:
  simiot:
    name: simiot-net
